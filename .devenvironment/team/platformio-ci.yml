name: PlatformIO CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy clang-format clangd cppcheck doxygen graphviz make
          python -m pip install --upgrade pip platformio

      - name: Generate compile database
        run: make compiledb

      - name: Build firmware
        run: make build

      - name: Static analysis
        run: make check

      - name: Generate docs
        run: make docs

