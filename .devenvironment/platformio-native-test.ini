[env:native]
platform = native
test_framework = googletest
build_type = debug
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
  -Wpedantic
  -DPIO_UNIT_TESTING

[env:native_coverage]
platform = native
test_framework = googletest
build_type = debug
build_unflags =
  -Os
  -O1
  -O2
  -O3
build_flags =
  -std=gnu++17
  -Wall
  -Wextra
  -Wpedantic
  -O0
  -g
  --coverage
  -fprofile-arcs
  -ftest-coverage
  -DPIO_UNIT_TESTING
test_build_src = yes
